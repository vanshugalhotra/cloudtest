<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Tasks</title>
    <meta name="description" content="A minimal, premium todo app deployed on Azure Apps.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TODO LIST</h1>
            <p class="subtitle">Vanshu Galhotra | Roll No: 205124107</p>
        </header>

        <div class="todo-card">
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required />
                <select id="todo-priority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
                <button type="submit" id="add-btn">Add</button>
            </form>

            <div class="error-msg" id="error-msg"></div>

            <ul id="todo-list">
                <!-- Todos will be injected here via JS -->
            </ul>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
